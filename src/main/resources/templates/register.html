<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Patient Register</title>
    <link rel="stylesheet" href="/css/app.css" />
  </head>
  <body>
    <header>
      <nav>
        <a href="/">Home</a>
        <a href="/login">Login</a>
      </nav>
    </header>
    <main>
      <h2>Patient Register</h2>
      <form id="regForm">
        <label>Full Name <input type="text" id="fullName" required /></label>
        <label>Email <input type="email" id="email" required /></label>
        <label>Phone <input type="text" id="phone" /></label>
        <label>Password <input type="password" id="password" required /></label>
        <button type="submit">Register</button>
      </form>
      <div id="msg"></div>
    </main>
    <script src="/js/app.js"></script>
    <script>
      document
        .getElementById("regForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const payload = {
            fullName: document.getElementById("fullName").value,
            email: document.getElementById("email").value,
            phone: document.getElementById("phone").value,
            password: document.getElementById("password").value,
          };
          try {
            await apiPost("/api/auth/register/patient", payload);
            showMsg("Registered successfully. Please login.");
            setTimeout(() => (window.location.href = "/login"), 700);
          } catch (err) {
            showMsg(err.message, true);
          }
        });
    </script>
  </body>
</html>
