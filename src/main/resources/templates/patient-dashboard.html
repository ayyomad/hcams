<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Patient Dashboard - HCAMS</title>
    <link rel="stylesheet" href="/css/app.css" />
  </head>
  <body>
    <header>
      <nav class="nav">
        <div class="brand">HCAMS</div>
        <div class="nav-links">
          <a href="/" onclick="sessionStorage.setItem('fromDashboard', 'true')">Home</a>
          <a href="/profile">My Profile</a>
          <a href="#" onclick="logout()">Logout</a>
        </div>
      </nav>
    </header>

    <main class="dashboard">
      <div class="container">
        <div class="dashboard-header">
          <h1 class="dashboard-title">Find Your Doctor</h1>
        </div>

        <!-- Search and Filter Bar -->
        <div class="search-bar">
          <input
            type="text"
            id="searchInput"
            class="search-input"
            placeholder="Search doctors by name or specialty..."
          />
          <select id="specialtyFilter" class="filter-select">
            <option value="">All Specialties</option>
            <option value="Cardiologist">Cardiologist</option>
            <option value="Dermatologist">Dermatologist</option>
            <option value="Pediatrician">Pediatrician</option>
            <option value="Orthopedic">Orthopedic</option>
            <option value="Neurologist">Neurologist</option>
            <option value="ENT">ENT</option>
            <option value="Gynecologist">Gynecologist</option>
            <option value="Urologist">Urologist</option>
            <option value="Ophthalmologist">Ophthalmologist</option>
            <option value="Psychiatrist">Psychiatrist</option>
            <option value="Oncologist">Oncologist</option>
            <option value="Endocrinologist">Endocrinologist</option>
            <option value="Nephrologist">Nephrologist</option>
            <option value="Gastroenterologist">Gastroenterologist</option>
          </select>
          <select id="sortFilter" class="filter-select">
            <option value="name">Sort by Name</option>
            <option value="specialty">Sort by Specialty</option>
            <option value="available">Available First</option>
          </select>
        </div>

        <!-- Doctors Grid -->
        <div id="doctorsGrid" class="grid grid-3">
          <!-- Doctors will be loaded here -->
        </div>

        <!-- My Appointments Section -->
        <div class="section">
          <h2 class="section-title">My Appointments</h2>
          <div id="myAppointments" class="grid grid-2">
            <!-- Appointments will be loaded here -->
          </div>
        </div>
      </div>
    </main>

    <!-- Doctor Detail Modal -->
    <div id="doctorModal" class="modal">
      <div class="modal-content" style="max-width: 800px">
        <div class="modal-header">
          <h2 class="modal-title" id="doctorModalTitle">Doctor Details</h2>
          <button class="close-btn" onclick="closeDoctorModal()">
            &times;
          </button>
        </div>

        <div id="doctorDetails">
          <!-- Doctor details will be loaded here -->
        </div>
      </div>
    </div>

    <!-- Booking Modal -->
    <div id="bookingModal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2 class="modal-title">Book Appointment</h2>
          <button class="close-btn" onclick="closeBookingModal()">
            &times;
          </button>
        </div>

        <div
          id="bookingConfirmation"
          style="
            margin-bottom: 2rem;
            padding: 1rem;
            background: #f8f9fa;
            border-radius: 0.5rem;
            border-left: 4px solid #10b981;
          "
        >
          <h3 style="margin-bottom: 1rem; color: #10b981">
            Appointment Confirmation
          </h3>
          <div id="appointmentDetails">
            <!-- Appointment details will be shown here -->
          </div>
        </div>

        <form id="bookingForm">
          <div class="form-group">
            <label class="form-label" for="selectedSlot"
              >Selected Time Slot</label
            >
            <input type="text" id="selectedSlot" class="form-input" readonly />
          </div>
          <div style="display: flex; gap: 1rem">
            <button
              type="button"
              class="btn btn-secondary"
              onclick="closeBookingModal()"
              style="flex: 1"
            >
              Cancel
            </button>
            <button type="submit" class="btn btn-primary" style="flex: 1">
              Confirm Booking
            </button>
          </div>
        </form>
      </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
      let doctors = [];
      let currentDoctor = null;
      let selectedSlot = null;

      // Load doctors on page load
      document.addEventListener("DOMContentLoaded", () => {
        // Check if user is authenticated
        if (!isAuthenticated()) {
          window.location.href = "/";
          return;
        }
        
        loadDoctors();
        loadMyAppointments();

        // Set today's date as default
        const today = new Date().toISOString().split("T")[0];
        const dateInput = document.getElementById("slotDate");
        if (dateInput) {
          dateInput.value = today;
        }
      });

      // Search and filter functionality
      document
        .getElementById("searchInput")
        .addEventListener("input", filterDoctors);
      document
        .getElementById("specialtyFilter")
        .addEventListener("change", filterDoctors);
      document
        .getElementById("sortFilter")
        .addEventListener("change", filterDoctors);

      async function loadDoctors() {
        try {
          doctors = await apiGet("/api/public/doctors");
          renderDoctors(doctors);
        } catch (e) {
          console.error("Failed to load doctors:", e);
        }
      }

      function renderDoctors(doctorsToRender) {
        const grid = document.getElementById("doctorsGrid");
        grid.innerHTML = "";

        doctorsToRender.forEach((doctor) => {
          const card = document.createElement("div");
          card.className = "doctor-card";
          card.onclick = () => openDoctorModal(doctor);

          const initials = doctor.fullName
            .split(" ")
            .map((n) => n[0])
            .join("");

          card.innerHTML = `
                    <div class="doctor-avatar">${initials}</div>
                    <div class="doctor-name">${doctor.fullName}</div>
                    <div class="doctor-specialty">${
                      doctor.specialty || "General Medicine"
                    }</div>
                    <div class="doctor-rating">
                        <span class="stars">★★★★★</span>
                        <span>(4.8)</span>
                    </div>
                    <button class="btn btn-primary" style="width: 100%;">View Available Slots</button>
                `;

          grid.appendChild(card);
        });
      }

      function filterDoctors() {
        const searchTerm = document
          .getElementById("searchInput")
          .value.toLowerCase().trim();
        const specialty = document.getElementById("specialtyFilter").value.trim();
        const sortBy = document.getElementById("sortFilter").value;

        console.log("Filtering:", { searchTerm, specialty, sortBy, totalDoctors: doctors.length });

        let filtered = doctors.filter((doctor) => {
          const doctorName = (doctor.fullName || "").toLowerCase();
          const doctorSpecialty = (doctor.specialty || "").toLowerCase();
          
          const matchesSearch = !searchTerm || 
            doctorName.includes(searchTerm) ||
            doctorSpecialty.includes(searchTerm);
          
          const matchesSpecialty = !specialty || doctor.specialty === specialty;
          
          return matchesSearch && matchesSpecialty;
        });

        console.log("Filtered doctors:", filtered.length);

        // Sort
        filtered.sort((a, b) => {
          switch (sortBy) {
            case "name":
              return (a.fullName || "").localeCompare(b.fullName || "");
            case "specialty":
              return (a.specialty || "").localeCompare(b.specialty || "");
            case "available":
              return 0;
            default:
              return 0;
          }
        });

        renderDoctors(filtered);
      }

      async function openDoctorModal(doctor) {
        currentDoctor = doctor;
        document.getElementById("doctorModalTitle").textContent =
          doctor.fullName;

        try {
          // Load today's slots by default
          const today = new Date().toISOString().split("T")[0];
          const slots = await apiGet(`/api/public/doctors/${doctor.id}/slots?date=${today}`);
          renderDoctorDetails(doctor, slots, today);
          document.getElementById("doctorModal").classList.add("active");
        } catch (e) {
          console.error("Failed to load doctor slots:", e);
        }
      }

      function renderDoctorDetails(doctor, slots, selectedDate) {
        const details = document.getElementById("doctorDetails");
        const initials = doctor.fullName
          .split(" ")
          .map((n) => n[0])
          .join("");

        const today = new Date().toISOString().split("T")[0];
        const displayDate = selectedDate || today;

        details.innerHTML = `
                <div style="display: flex; gap: 2rem; margin-bottom: 2rem;">
                    <div class="doctor-avatar" style="width: 80px; height: 80px; font-size: 2rem;">${initials}</div>
                    <div>
                        <h2 style="margin-bottom: 0.5rem;">${
                          doctor.fullName
                        }</h2>
                        <p style="color: var(--text-muted); font-size: 1.1rem;">${
                          doctor.specialty || "General Medicine"
                        }</p>
                        <div class="doctor-rating" style="margin-top: 1rem;">
                            <span class="stars">★★★★★</span>
                            <span>(4.8) • 127 reviews</span>
                        </div>
                    </div>
                </div>
                
                <div>
                    <h3 style="margin-bottom: 1rem;">Available Time Slots</h3>
                    <div style="margin-bottom: 1rem; display: flex; gap: 1rem; align-items: center;">
                        <label for="slotDate" style="font-weight: 500;">Select Date:</label>
                        <input type="date" id="slotDate" value="${displayDate}" min="${today}" style="padding: 0.5rem; border: 1px solid var(--border); border-radius: 0.375rem;" onchange="loadSlotsForDate()">
                        <button class="btn btn-secondary" onclick="loadSlotsForDate()">Load Slots</button>
                    </div>
                    <p style="color: var(--text-muted); margin-bottom: 1rem;">
                      <span style="display: inline-block; width: 12px; height: 12px; background: #10b981; border-radius: 2px; margin-right: 4px;"></span>Available
                      <span style="display: inline-block; width: 12px; height: 12px; background: #dc2626; border-radius: 2px; margin: 0 4px 0 16px;"></span>Booked
                    </p>
                    <div id="slotsContainer">
                        <p style="color: var(--text-muted); text-align: center;">Loading slots...</p>
                    </div>
                </div>
            `;
        
        // Render the initial slots
        renderSlotsForDate(slots, displayDate);
      }

      async function loadSlotsForDate() {
        if (!currentDoctor) return;

        const dateInput = document.getElementById("slotDate");
        const date = dateInput.value;

        if (!date) {
          alert("Please select a date");
          return;
        }

        try {
          const slots = await apiGet(
            `/api/public/doctors/${currentDoctor.id}/slots?date=${date}`
          );
          renderSlotsForDate(slots, date);
        } catch (e) {
          console.error("Failed to load slots for date:", e);
          document.getElementById("slotsContainer").innerHTML =
            '<p style="color: var(--danger);">Failed to load slots for the selected date.</p>';
        }
      }

      function renderSlotsForDate(slots, date) {
        const container = document.getElementById("slotsContainer");

        if (!slots || slots.length === 0) {
          container.innerHTML =
            '<p style="color: var(--text-muted); text-align: center; padding: 2rem;">No slots available for the selected date. Doctor may be off on this day.</p>';
          return;
        }

        // Show ALL slots (both available and booked) with color coding
        const slotsHTML = slots
          .map((slot) => {
            const time = new Date(slot.startTime).toLocaleTimeString("en-US", {
              hour: "2-digit",
              minute: "2-digit",
              hour12: true,
            });
            const slotClass = slot.available ? "available" : "booked";
            const clickHandler = slot.available ? `onclick="selectSlot(${slot.id}, '${time}', ${slot.available})"` : '';
            const disabledClass = slot.available ? '' : 'disabled-slot';
            return `
            <div class="slot ${slotClass} ${disabledClass}" ${clickHandler}>
              ${time}
              ${!slot.available ? '<br><small style="font-size: 0.75rem; color: white;">Booked</small>' : ''}
            </div>
          `;
          })
          .join("");

        container.innerHTML = `
          <div class="slot-grid">
            ${slotsHTML}
          </div>
        `;
      }

      function selectSlot(slotId, time, available) {
        if (!available) return;

        selectedSlot = { id: slotId, time };
        document.getElementById(
          "selectedSlot"
        ).value = `${currentDoctor.fullName} - ${time}`;

        // Show appointment confirmation details
        const appointmentDetails =
          document.getElementById("appointmentDetails");
        const selectedDate = document.getElementById("slotDate").value;
        const formattedDate = new Date(selectedDate).toLocaleDateString(
          "en-US",
          {
            weekday: "long",
            year: "numeric",
            month: "long",
            day: "numeric",
          }
        );

        appointmentDetails.innerHTML = `
          <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem;">
            <div>
              <strong>Doctor:</strong><br>
              ${currentDoctor.fullName}
            </div>
            <div>
              <strong>Specialty:</strong><br>
              ${currentDoctor.specialty || "General Medicine"}
            </div>
            <div>
              <strong>Date:</strong><br>
              ${formattedDate}
            </div>
            <div>
              <strong>Time:</strong><br>
              ${time}
            </div>
          </div>
        `;

        closeDoctorModal();
        document.getElementById("bookingModal").classList.add("active");
      }

      function closeDoctorModal() {
        document.getElementById("doctorModal").classList.remove("active");
      }

      function closeBookingModal() {
        document.getElementById("bookingModal").classList.remove("active");
        selectedSlot = null;
      }

      // Booking form handler
      document
        .getElementById("bookingForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          if (!selectedSlot || !currentDoctor) {
            alert("Please select a time slot first");
            return;
          }

          const currentUser = getCurrentUser();
          if (!currentUser) {
            alert("Please login first");
            window.location.href = "/";
            return;
          }

          const payload = {
            patientId: currentUser.userId,
            doctorId: currentDoctor.id,
            slotId: selectedSlot.id,
          };

          try {
            const appointmentId = await apiPost(
              "/api/patient/appointments",
              payload,
              true
            );
            alert(`Appointment booked successfully! ID: ${appointmentId}`);
            closeBookingModal();
            loadMyAppointments();
            loadDoctors(); // Refresh to update slot availability
          } catch (e) {
            alert(`Failed to book appointment: ${e.message}`);
          }
        });

      async function loadMyAppointments() {
        try {
          const currentUser = getCurrentUser();
          if (!currentUser) return;
          
          const appointments = await apiGet(
            `/api/patient/appointments/${currentUser.userId}`,
            true
          );
          renderMyAppointments(appointments);
        } catch (e) {
          console.error("Failed to load appointments:", e);
        }
      }

      function renderMyAppointments(appointments) {
        const container = document.getElementById("myAppointments");
        container.innerHTML = "";

        if (appointments.length === 0) {
          container.innerHTML =
            '<p style="color: var(--text-muted); text-align: center; grid-column: 1 / -1;">No appointments yet.</p>';
          return;
        }

        appointments.forEach((appointment) => {
          const card = document.createElement("div");
          card.className = "card";

          const date = new Date(
            appointment.slot.startTime
          ).toLocaleDateString();
          const time = new Date(appointment.slot.startTime).toLocaleTimeString(
            "en-US",
            {
              hour: "2-digit",
              minute: "2-digit",
              hour12: true,
            }
          );

          card.innerHTML = `
                    <h3>Dr. ${appointment.doctor.fullName}</h3>
                    <p><strong>Date:</strong> ${date}</p>
                    <p><strong>Time:</strong> ${time}</p>
                    <p><strong>Status:</strong> <span style="color: ${
                      appointment.status === "BOOKED"
                        ? "var(--success)"
                        : "var(--danger)"
                    }">${appointment.status}</span></p>
                    <div style="margin-top: 1rem; display: flex; gap: 0.5rem;">
                        <button class="btn btn-secondary" onclick="viewReport(${
                          appointment.id
                        }, '${appointment.remarks || ""}', '${
            appointment.prescription || ""
          }')">View Report</button>
                        ${
                          appointment.status === "BOOKED"
                            ? `<button class="btn btn-outline" onclick="cancelAppointment(${appointment.id})">Cancel</button>`
                            : ""
                        }
                    </div>
                `;

          container.appendChild(card);
        });
      }

      function viewReport(appointmentId, remarks, prescription) {
        alert(
          `Medical Report:\n\nRemarks: ${
            remarks || "No remarks yet"
          }\n\nPrescription: ${prescription || "No prescription yet"}`
        );
      }

      async function cancelAppointment(appointmentId) {
        if (!confirm("Are you sure you want to cancel this appointment?"))
          return;

        try {
          await apiDelete(`/api/patient/appointments/${appointmentId}`, true);
          alert("Appointment cancelled successfully");
          loadMyAppointments();
          loadDoctors(); // Refresh to update slot availability
        } catch (e) {
          alert(`Failed to cancel appointment: ${e.message}`);
        }
      }

      // Close modals on outside click
      document.getElementById("doctorModal").addEventListener("click", (e) => {
        if (e.target.id === "doctorModal") closeDoctorModal();
      });

      document.getElementById("bookingModal").addEventListener("click", (e) => {
        if (e.target.id === "bookingModal") closeBookingModal();
      });
    </script>
  </body>
</html>
